
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="styles.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js" defer></script>
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <header class="topbar" role="banner">
  <div class="brand">
    <h1>Explore The World</h1>
    <p>Search and explore regions.</p>
  </div>
  
  <div class="controls">
    <input type="text" id="search" placeholder="Search country...">
    <select id="regionFilter">
      <option value="">All Regions</option>
      <option value="Africa">Africa</option>
      <option value="Asia">Asia</option>
      <option value="Europe">Europe</option>
      <option value="Americas">Americas</option>
      <option value="Oceania">Oceania</option>
    </select>
  </div>
</header>

  <div id="map" role="region" aria-label="Interactive world map"></div>

  <div id="overlay" aria-hidden="true"></div>

   <aside id="countryPanel" role="dialog" aria-labelledby="countryName" aria-modal="true" hidden>
    <button id="closePanel" aria-label="Close country details" class="terminal-close">×</button>
    <div id="countryDetails">
     </div>
  </aside>
</body>
</html>
